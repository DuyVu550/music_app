# =============================================================================
# THÔNG TIN DỰ ÁN & KIẾN TRÚC (ARCHITECTURAL DOCUMENTATION)
# =============================================================================
#
# 1. Dự án này làm gì:
#    - Một ứng dụng Music App (nghe nhạc trực tuyến và ngoại tuyến) viết bằng Flutter.
#
# 2. Cấu trúc thư mục chính (Clean Architecture - Feature-first):
#    - lib/core/ : Chứa các module dùng chung của hệ thống (network, theme, constants, utils).
#    - lib/features/ : Chia theo tính năng chính (auth, player, playlist, explore).
#      Trong mỗi feature chia làm 3 tầng:
#      - data/: datasources (gọi API/DB), models (DTOs), repositories (implement).
#      - domain/: entities (lớp business thuần túy), repositories (interface/contract).
#      - presentation/: controllers (Riverpod Notifiers), pages (màn hình UI), widgets (UI components nhỏ).
#
# 3. Tech Stack đang dùng:
#    - Framework: Flutter
#    - State Management: Riverpod (Ưu tiên AsyncNotifierProvider để quản lý state bất đồng bộ)
#    - Local/Remote Communication: Dio, Retrofit (hoặc ApiClient tự viết)
#    - Code Generation: Freezed (Entity & Model bất biến - Immutable), Build Runner
#
# 4. Luồng xử lý quan trọng (Data Flow):
#    - DataSource (Remote/Local) -> Trả về DTO Model -> Repository (Map từ DTO Model sang Domain Entity)
#    - Domain Entity -> Riverpod Controller (AsyncNotifier) -> Rebuild UI (ConsumerWidget/ConsumerStatefulWidget)
#
# 5. Những file/module cần chú ý:
#    - lib/core/network/api_client.dart : Điểm tập trung cấu hình gọi mạng (Dio).
#    - lib/core/theme/theme.dart : Thiết lập giao diện Dark/Light Mode đồng nhất.
#    - lib/features/player : Feature cốt lõi xử lý audio playback.
#
# 6. Quy ước code, naming:
#    - Tên file: snake_case (ví dụ: song_detail_page.dart).
#    - Tên class: PascalCase (ví dụ: SongDetailPage, PlayerNotifier).
#    - Tên biến, hàm: camelCase (ví dụ: currentPlayingSong, playNextSong()).
#    - Data Transfer Object đặt đuôi là `Dto` hoặc `Model` (ví dụ: TrackDto), Domain Entity giữ nguyên tên gốc (ví dụ: Track).
#
# 7. Tính năng cốt lõi & Nâng cấp Pro (Core & Pro Features):
#    - Module User (Quản lý tài khoản):
#      + Đăng nhập, đăng ký, quên mật khẩu, đổi mật khẩu.
#      + Hiển thị thông tin cá nhân (User Profile).
#      + Đăng xuất.
#    - Màn hình Home:
#      + Slide Images bài hát nổi bật + Auto Run (Realtime).
#      + Thể loại nhạc (Category) & Nghệ sĩ (Artist) nổi bật (Realtime).
#      + Bài hát phổ biến (Popular Songs) & Bài hát yêu thích (Favorite Songs) (Realtime).
#      + Layout Bottom điều khiển trình phát nhạc nhanh (Play/Pause, Next, Back, Close) ở tất cả màn hình.
#    - Các màn hình danh sách & Điều hướng:
#      + Danh sách tất cả bài hát (All Songs) - Realtime.
#      + Danh sách tất cả thể loại nhạc (Category List) -> Click vào xem danh sách bài hát thuộc Category đó.
#      + Danh sách tất cả nghệ sĩ (Artist List) -> Click vào xem danh sách bài hát của Artist đó.
#      + Danh sách tất cả bài hát phổ biến (Popular Songs List) - Realtime.
#      + Danh sách tất cả bài hát yêu thích (Favorite Songs List) theo từng User - Realtime.
#    - Màn hình Search:
#      + Tìm kiếm bài hát theo keyword (tên bài hát).
#    - Dialog Bottom (Options khi click vào nút 3 chấm của bài hát):
#      + Tải bài hát (Download).
#      + Ưu tiên phát kế tiếp (Play Next).
#      + Thêm bài hát vào danh sách phát (Add to queue).
#      + Xóa bài hát khỏi danh sách phát (Remove from queue).
#    - Màn hình Music Player (Trình phát nhạc):
#      + Hiển thị thông tin chi tiết bài hát, số lượt nghe.
#      + Điều khiển nhạc: Play/Pause, Next, Back, tua nhạc (seek), chế độ phát ngẫu nhiên (Shuffle), lặp lại 1 bài (Repeat One).
#      + Thêm bài hát vào danh sách yêu thích, tải bài hát trực tiếp từ Player.
#      + Xem danh sách bài hát đang chạy (List Songs Playing) và có thể xóa bài hát ra khỏi hàng chờ phát hiện tại.
#    - Hệ thống thông báo (Push Notification):
#      + Notification điều khiển nhạc: Play/Pause, Next, Back, Close.
#      + Notification thông báo tiến trình download bài hát.
#    - Tính năng Feedback & Liên hệ (Contact):
#      + Feedback: Gửi phản hồi, đóng góp ý kiến hoặc đánh giá ứng dụng.
#      + Contact: Hiển thị các liên kết liên hệ nhà phát triển (Facebook, Call Phone, Gmail, Skype, Zalo, Youtube).
#
# 7.1. Các tính năng dành cho Quản trị viên (Admin Features):
#    - Role Quản trị viên (Admin):
#      + Quản lý bài hát: Thêm, sửa, xóa, hiển thị danh sách bài hát trên ứng dụng.
#      + Tìm kiếm bài hát theo tên trong trang quản lý.
#      + Quản lý danh sách feedback (phản hồi, đóng góp ý kiến) của người dùng.
#
# 7.2. Các tính năng nâng cấp VIP (VIP Features - Dự kiến triển khai):
#    - Role Quản trị viên (Admin):
#      + Quản lý Category (Thể loại): Thêm, sửa, xóa, tìm kiếm, hiển thị danh sách Category.
#      + Quản lý Artist (Nghệ sĩ): Thêm, sửa, xóa, tìm kiếm, hiển thị danh sách Artist.
#    - Hệ thống thông báo (Push Notification):
#      + Hiển thị thông báo đẩy (Local/Push Notification) thông báo tiến trình download bài hát trực tiếp trong ứng dụng.
#
# 8. Lưu ý Code Style (Dành cho AI & Developers):
#    - Viết code tường minh, dễ hiểu, tránh các cú pháp viết tắt quá mức gây khó hiểu.
#    - Luôn viết comment giải thích ý đồ thiết kế với các hàm xử lý logic phức tạp.
#    - Giữ các hàm ngắn gọn, tập trung vào một nhiệm vụ duy nhất (Single Responsibility).
# =============================================================================

